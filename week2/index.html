<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic AI - Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🚀 Task Manager</h1>
        
        <div id="notification-container"></div>

        <form id="task-form">
            <div class="input-group">
                <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off">
                <button type="submit" id="add-btn">Add Task</button>
            </div>
        </form>

        <div class="task-card">
            <h2>Your Tasks</h2>
            <ul id="task-list">
                <li class="empty-state">No tasks available. Add one above!</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
